# Stable-only rustfmt config: every option here is available on the default
# (stable) toolchain, so `cargo fmt` works without nightly. The two options
# that actually shape this codebase's layout — max_width and
# use_small_heuristics — are stable; the rest are stable defaults kept
# explicit to document intent. (The previous config pinned an old nightly
# via `required_version` and enabled many unstable options, which made
# stable `cargo fmt` silently reformat to its own defaults.)
max_width = 90
hard_tabs = false
tab_spaces = 4
newline_style = "Auto"
use_small_heuristics = "Max"
fn_params_layout = "Tall"
match_block_trailing_comma = false
remove_nested_parens = true
reorder_imports = true
reorder_modules = true
merge_derives = true
use_try_shorthand = false
use_field_init_shorthand = false
force_explicit_abi = true
edition = "2024"
